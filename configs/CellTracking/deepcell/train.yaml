# ============================================================
# SelfMOTR — DeepCell — Training config (large run)
# ============================================================
# Dataset stats (from COCO annotations):
#   Train: 91 seqs, 4750 frames, cells/frame: mean=95, max=308, p95=237
#   Val:   27 seqs, 1317 frames, cells/frame: mean=80, max=195, p95=176
#   Image size: 584×600 px
# ============================================================

# --- paths ---
mot_path: /srv/home/chen/Cell-TRACTR/data/deepcell/COCO
output_dir: /srv/home/chen/cell_motr/self/outputs/cell_deepcell_self
pretrained: /srv/home/chen/self/ckpt/r50_deformable_detr_plus_iterative_bbox_refinement-checkpoint.pth

# --- dataset ---
dataset_file: e2e_cell
meta_arch: motrv2_self

# --- model ---
backbone: resnet50
num_feature_levels: 4
enc_layers: 6
dec_layers: 6
dim_feedforward: 1024
hidden_dim: 256
nheads: 8
dec_n_points: 4
enc_n_points: 4
num_anchors: 1
with_box_refine: true
two_stage: false
shared_decoder: true

# --- queries ---
# p95=237 cells/frame → 300 covers nearly all frames.
# 350 covers the absolute max (308) but costs more VRAM; use 300 on tight GPUs.
num_queries: 300
# Detection proposals: ~1.5× num_queries is a good ratio for dense scenes
num_queries_detect: 500

# --- query interaction ---
query_interaction_layer: QIMv2
random_drop: 0.1
fp_ratio: 0.1
merger_dropout: 0.0
dropout: 0.0

# --- sampling / curriculum ---
# 4-stage curriculum: start short for stable early training, grow clip length
# as the tracker learns to propagate state.
# sampler_steps epoch thresholds: lengths[0] until epoch 10,
#   lengths[1] until 25, lengths[2] until 40, then lengths[3].
sample_mode: random_interval
sample_interval: 1        # MUST be 1: division supervision requires t and t+1 consecutive in same clip
sampler_lengths: [2, 3, 4, 4]
sampler_steps: [10, 25, 40]

# --- optimiser ---
lr: 2.0e-4
lr_backbone: 2.0e-5
lr_backbone_names: ["backbone.0"]
lr_linear_proj_names: ["reference_points", "sampling_offsets"]
lr_linear_proj_mult: 0.1
weight_decay: 1.0e-4
clip_max_norm: 0.1
sgd: false

# --- schedule ---
epochs: 50
lr_drop: 40              # cosine-like: drop at 80% of training
save_period: 5

# --- loss weights ---
cls_loss_coef: 2.0
bbox_loss_coef: 5.0
giou_loss_coef: 2.0
set_cost_class: 2.0
set_cost_bbox: 5.0
set_cost_giou: 2.0
focal_alpha: 0.25
aux_loss: true

# --- division prediction ---
# man_track/ files are present for all 91 train sequences.
# pos_weight=5 (hardcoded in loss) handles the ~2-5% positive rate within BCE.
# div_loss_coef scales the whole division loss relative to tracking loss.
# loss_div_class uses balanced negative sampling (5:1 neg:pos ratio) so the gradient
# magnitude is independent of K (number of matched tracks). Dense scenes (K≈70) no
# longer get 14× weaker gradient than sparse scenes (K≈5).
div_loss_coef: 10.0
div_pos_weight: 5.0          # pos_weight for BCE division loss; ~2-5% positive rate needs strong boost
# MLP affinity loss weight (division proposal affinity cross-entropy)
div_affinity_loss_coef: 2.0

# --- score consistency ---
# Penalises MSE between a track's confidence score at t vs t-1.
# Forces stable per-track scores and reduces dropout-then-reappear behaviour.
score_consist_loss_coef: 0.5

# --- division-clip oversampling ---
# 40% of clips are drawn from the division pool so the model sees dividing
# cells often enough despite them being a small fraction of total frames.
div_ratio: 0.4

# Extra copies of clips where a daughter pair is born (position 1 = near,
# end of max-window = far).  Additive on top of div_ratio rebalancing.
# Set to 0: even birth_oversample=2 created enough gradient variance to cause
# catastrophic drift (epoch-22 divergence). div_ratio=0.3 already ensures
# sufficient exposure to division events without per-event cluster amplification.
birth_oversample: 0

# --- self-proposal ---
score_threshold: 0.05
lambda_detect: 1.0
query_denoise: 0.05

# --- periodic val inference ---
eval_period: 5
infer_config: /srv/home/chen/cell_motr/self/configs/CellTracking/deepcell/infer.yaml

# --- training utilities ---
batch_size: 1
# Target effective batch = 4: accum_iter = max(1, 4 // num_gpus)
#   1 GPU  → --accum_iter 4
#   2 GPUs → --accum_iter 2
#   4 GPUs → --accum_iter 1  (default below)
accum_iter: 1
num_workers: 4           # cluster nodes typically have ≥8 CPUs
reuse_encoder_cache: true
device: cuda
seed: 42
use_checkpoint: true     # gradient checkpointing: saves VRAM with 300+ queries

# --- mask prediction ---
masks: true
mask_loss_coef: 2.0

# --- unused / keep defaults ---
memory_bank_type: ~
memory_bank_score_thresh: 0.0
memory_bank_len: 4
memory_bank_with_self_attn: false
