# ============================================================
# SelfMOTR — DeepCell — No-Division Training Config
# Daughters are treated as independent new cells; no division
# prediction head, no div loss.
# ============================================================

# --- paths ---
mot_path: /srv/home/chen/Cell-TRACTR/data/deepcell/COCO
output_dir: /srv/home/chen/cell_motr/self/outputs/cell_deepcell_no_div
pretrained: /srv/home/chen/self/ckpt/r50_deformable_detr_plus_iterative_bbox_refinement-checkpoint.pth

# --- dataset ---
dataset_file: e2e_cell_no_div
meta_arch: motrv2_self_no_div

# --- model (must match inference config exactly) ---
backbone: resnet50
num_feature_levels: 4
enc_layers: 6
dec_layers: 6
dim_feedforward: 1024
hidden_dim: 256
nheads: 8
dec_n_points: 4
enc_n_points: 4
num_anchors: 1
with_box_refine: true
two_stage: false
shared_decoder: true

# --- queries ---
num_queries: 300
num_queries_detect: 500

# --- query interaction ---
query_interaction_layer: QIMv2
random_drop: 0.1
fp_ratio: 0.1
merger_dropout: 0.0
dropout: 0.0

# --- sampling / curriculum ---
sample_mode: random_interval
sample_interval: 1
sampler_lengths: [2, 4, 6, 8]
sampler_steps: [10, 25, 40]

# --- optimiser ---
lr: 2.0e-4
lr_backbone: 2.0e-5
lr_backbone_names: ["backbone.0"]
lr_linear_proj_names: ["reference_points", "sampling_offsets"]
lr_linear_proj_mult: 0.1
weight_decay: 1.0e-4
clip_max_norm: 1.0
sgd: false

# --- schedule ---
epochs: 50
lr_drop: 40
save_period: 5

# --- loss weights ---
cls_loss_coef: 2.0
bbox_loss_coef: 5.0
giou_loss_coef: 2.0
set_cost_class: 2.0
set_cost_bbox: 5.0
set_cost_giou: 2.0
focal_alpha: 0.25
aux_loss: true

# --- no division losses ---
div_loss_coef: 0.0

# --- self-proposal ---
score_threshold: 0.05
lambda_detect: 1.0
query_denoise: 0.05

# --- newborn-cell oversampling ---
# Extra training clips injected per birth event so the detector sees
# cells appearing from nowhere far more often than uniform sampling.
birth_oversample: 5

# --- training utilities ---
batch_size: 1
accum_iter: 1
num_workers: 4
reuse_encoder_cache: true
device: cuda
seed: 42
use_checkpoint: true

# --- unused / keep defaults ---
masks: false
memory_bank_type: ~
memory_bank_score_thresh: 0.0
memory_bank_len: 4
memory_bank_with_self_attn: false
