# ============================================================
# SelfMOTR — DeepCell — Inference / eval config
# ============================================================

# --- paths ---
mot_path: /srv/home/chen/Cell-TRACTR/data/deepcell/COCO
output_dir: /srv/home/chen/cell_motr/self/outputs/cell_deepcell_self_eval
resume: /srv/home/chen/cell_motr/self/outputs/cell_deepcell_self/checkpoint.pth

# --- dataset ---
dataset_file: e2e_cell
meta_arch: motrv2_self

# --- model (must match training config exactly) ---
backbone: resnet50
num_feature_levels: 4
enc_layers: 6
dec_layers: 6
dim_feedforward: 1024
hidden_dim: 256
nheads: 8
dec_n_points: 4
enc_n_points: 4
num_anchors: 1
with_box_refine: true
two_stage: false
shared_decoder: true

# --- queries (must match training) ---
num_queries: 300
num_queries_detect: 500

# --- query interaction (must match training) ---
query_interaction_layer: QIMv2
random_drop: 0.0
fp_ratio: 0.0
merger_dropout: 0.0
dropout: 0.0

# --- inference thresholds ---
# score_threshold gates which detected tracks are shown in the output.
# update_score_threshold controls when RuntimeTrackerBase activates / kills IDs.
# Both should be equal in practice; lower values improve recall at cost of more FP.
# At epoch 12/50 the model is still learning — 0.15 trades some precision for recall.
# Raise back toward 0.3–0.4 as training matures.
score_threshold: 0.15
update_score_threshold: 0.15
proposal_threshold: 0.05
miss_tolerance: 5
div_score_thresh: 0.3         # pred_logits[:, 1].sigmoid() gate; lowered from 0.5 — model may output 0.3-0.4 for dividing cells

# --- gap closing (post-processing) ---
gap_close_frames: 5          # stitch tracks separated by up to this many frames
gap_close_dist_factor: 1.5   # max stitching distance as × of the smaller track's box diagonal

# --- split to evaluate ---
split: val

# --- encoder cache reuse ---
reuse_encoder_cache: true

# --- viz_cell.py settings ---
# div_threshold: fallback post-processing gate — if a track ends with max_div_score
# >= div_threshold, search for daughter tracks in the next frame.
# Lowered from 0.5 to match div_score_thresh so both mechanisms use same bar.
div_threshold: 0.3
max_div_dist_factor: 2.0
fps: 8
scale: 1   # deepcell images are already 584×600; no upscaling needed

# --- sampling (only affects dataloader) ---
sample_mode: fixed_interval
sample_interval: 1
sampler_lengths: [1]
sampler_steps: ~

# --- division prediction ---
div_loss_coef: 10.0
# MUST match training value — controls whether both DivisionProposalMLPs are built.
# If 0 (or absent), neither MLP is instantiated and checkpoint weights are silently skipped.
div_affinity_loss_coef: 1.0

# --- score consistency (must match training to keep weight_dict consistent) ---
score_consist_loss_coef: 2.0

# --- runtime ---
batch_size: 1
num_workers: 2
device: cuda
seed: 42

# --- output format ---
masks: true
mask_loss_coef: 2.0

# --- unused / keep defaults ---
aux_loss: true
cls_loss_coef: 2.0
bbox_loss_coef: 5.0
giou_loss_coef: 2.0
set_cost_class: 2.0
set_cost_bbox: 5.0
set_cost_giou: 2.0
focal_alpha: 0.25
mask_loss_coef: 1.0
dice_loss_coef: 1.0
memory_bank_type: ~
memory_bank_score_thresh: 0.0
memory_bank_len: 4
memory_bank_with_self_attn: false
use_checkpoint: false
accum_iter: 1
query_denoise: 0.0
lambda_detect: 0.5
